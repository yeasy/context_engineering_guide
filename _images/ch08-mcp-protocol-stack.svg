<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">MCP 协议栈分层图</title>
  <desc id="desc">展示 Host、Client、JSON-RPC 会话、传输层、Server 与 Tools/Resources/Prompts 的分层关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef4fb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#16324f" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="960" height="560" rx="28" fill="url(#bg)" />
  <text x="56" y="62" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#16324f">MCP 协议栈分层图</text>
  <text x="56" y="92" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" fill="#486581">对应 MCP 2025-06-18 规范中的 host-client-server 架构与 capability negotiation。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="128" width="720" height="74" rx="22" fill="#16324f" />
    <text x="480" y="156" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#ffffff">Host / AI 应用</text>
    <text x="480" y="182" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#d9e2ec">负责用户授权、上下文聚合、安全边界与多客户端编排</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="224" width="640" height="66" rx="20" fill="#3e7cb1" />
    <text x="480" y="250" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#ffffff">MCP Client</text>
    <text x="480" y="274" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ebf4fa">与单个服务器维持 1:1 有状态会话，完成初始化、能力协商、消息路由</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="312" width="560" height="56" rx="18" fill="#2a9d8f" />
    <text x="480" y="347" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#ffffff">JSON-RPC 2.0 Session</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="390" width="270" height="72" rx="18" fill="#e9c46a" />
    <text x="335" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#3b2f16">Transport: stdio</text>
    <text x="335" y="444" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#3b2f16">本地进程 / 容器内通信</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="390" width="270" height="72" rx="18" fill="#e76f51" />
    <text x="625" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#ffffff">Transport: Streamable HTTP</text>
    <text x="625" y="444" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#ffffff">远程服务 / 网络边界 / OAuth 2.1</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="484" width="640" height="50" rx="16" fill="#264653" />
    <text x="480" y="514" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#ffffff">MCP Server: 暴露 Tools / Resources / Prompts，按声明能力提供服务</text>
  </g>

  <line x1="480" y1="202" x2="480" y2="224" stroke="#9fb3c8" stroke-width="4" />
  <line x1="480" y1="290" x2="480" y2="312" stroke="#9fb3c8" stroke-width="4" />
  <line x1="480" y1="368" x2="480" y2="390" stroke="#9fb3c8" stroke-width="4" />
  <line x1="335" y1="462" x2="335" y2="484" stroke="#9fb3c8" stroke-width="4" />
  <line x1="625" y1="462" x2="625" y2="484" stroke="#9fb3c8" stroke-width="4" />
</svg>
